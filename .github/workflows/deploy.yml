name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  NODE_VERSION: '20'

jobs:
  # ── Gate 1: Security Scan ──────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in code
        run: |
          echo "Scanning for hardcoded secrets..."
          PATTERNS=(
            'TELNYX_API_KEY='
            'OPENAI_API_KEY='
            'ANTHROPIC_API_KEY='
            'SUPABASE_SERVICE_ROLE_KEY='
            'GOOGLE_MAPS_API_KEY='
            'sk-[a-zA-Z0-9]{20,}'
            '-----BEGIN.*PRIVATE KEY-----'
            'password\s*=\s*['\''"][^'\''"]+['\''"]'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn --include="*.ts" --include="*.js" --include="*.json" \
               --exclude-dir=node_modules --exclude-dir=.git \
               -E "$pattern" src/ tests/ 2>/dev/null; then
              echo "CRITICAL: Secret pattern found: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 1 ]; then
            echo "::error::Secrets detected in source code. Deployment blocked."
            exit 1
          fi
          echo "No secrets found in source code."

      - name: Check for .env files
        run: |
          if find . -name ".env" -not -name ".env.example" -not -path "./.git/*" | grep -q .; then
            echo "::error::.env file found in repository. Remove it before deploying."
            exit 1
          fi
          echo "No .env files found."

      - name: Dependency audit
        run: |
          npm ci
          npm audit --audit-level=high || {
            echo "::warning::High/critical vulnerabilities found in dependencies"
            exit 1
          }

  # ── Gate 2: Code Quality ───────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: Check for unsafe patterns
        run: |
          echo "Checking for unsafe code patterns..."
          ISSUES=0

          # Check for eval() usage
          if grep -rn "eval(" --include="*.ts" --include="*.js" src/ 2>/dev/null; then
            echo "::warning::eval() usage detected"
            ISSUES=$((ISSUES + 1))
          fi

          # Check for any type assertions
          ANY_COUNT=$(grep -rn ": any" --include="*.ts" src/ 2>/dev/null | wc -l || echo "0")
          if [ "$ANY_COUNT" -gt 0 ]; then
            echo "::warning::$ANY_COUNT occurrences of 'any' type found"
          fi

          # Check file sizes (max 300 lines)
          while IFS= read -r file; do
            LINES=$(wc -l < "$file")
            if [ "$LINES" -gt 300 ]; then
              echo "::warning::$file has $LINES lines (max 300)"
              ISSUES=$((ISSUES + 1))
            fi
          done < <(find src/ -name "*.ts" -type f 2>/dev/null)

          echo "Code quality check complete. Issues: $ISSUES"

  # ── Gate 3: Tests ──────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --reporter=verbose

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Gate 4: Deploy Preview (PRs) ──────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    needs: [security-scan, code-quality, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview deployed to: $URL"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `## Vercel Preview Deployment\n\n` +
              `| Check | Status |\n|-------|--------|\n` +
              `| Security Scan | :white_check_mark: Passed |\n` +
              `| Code Quality | :white_check_mark: Passed |\n` +
              `| Test Suite | :white_check_mark: Passed |\n` +
              `| Preview Deploy | :white_check_mark: [View](${url}) |\n\n` +
              `> Preview URL: ${url}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Gate 5: Deploy Production (main) ──────────────────────────────
  deploy-production:
    name: Deploy Production
    needs: [security-scan, code-quality, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Production deployed to: $URL"

      - name: Post-deploy health check
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking deployment health at $URL..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 5 attempts"
          exit 1
