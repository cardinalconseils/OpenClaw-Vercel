# Railway Nixpacks build configuration
[phases.setup]
nixPkgs = ["nodejs_22", "git", "curl", "jq", "bash"]

[phases.install]
cmds = ["npm ci", "npm install -g openclaw", "ln -sf $(npm root -g)/../bin/openclaw /usr/local/bin/openclaw || true"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "bash scripts/startup.sh"
